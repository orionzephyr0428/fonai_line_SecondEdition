services:
  bot-5000:
    build:
      context: ./bot
      dockerfile: Dockerfile
    image: my-bot:latest
    command: >
      gunicorn app:app
      --bind 0.0.0.0:5000
      --workers 1
      --threads 4
      --worker-class gthread
      --timeout 300
      --max-requests 1000
      --max-requests-jitter 50
      --log-level info
    env_file:
      - bot/.env
    environment:
      PYTHONPATH: /app
      PYTHONUNBUFFERED: "1"
      WARMUP: "0"
      MAX_CONCURRENCY: "1"
    ports:
      - "127.0.0.1:5000:5000"
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "5"

  crawler-6000:
    build:
      context: ./crawler
      dockerfile: Dockerfile
    image: my-crawler:latest
    command: >
      gunicorn app:app
      --bind 0.0.0.0:6000
      --workers 2
      --threads 4
      --worker-class sync
      --timeout 120
      --keep-alive 5
      --log-level info
    environment:
      PYTHONPATH: /app
      PYTHONUNBUFFERED: "1"
    dns:
      - 8.8.8.8
      - 1.1.1.1
    ports:
      - "127.0.0.1:6000:6000"
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "5"
